<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        h1 {
            background-color: red;
        }
        p {
            background-color: blue;
        }

        #cabecalho-um {
            background-color: purple;
        }
        
        .titulo {
            background-color: green;
        }

        .bold {
            background-color: yellow;
        }
    </style>
</head>

<body>
    <h1 id="cabecalho-um" class="titulo">
        Aula 3 - Atributos de id e class
    </h1>
    <h1 id="cabecalho-dois" class="titulo">
        Aula 3 - <b>Atributos</b> de id e class
    </h1>

    <p>
        <b class = "bold">meow</b>
    </p>
</body>

</html>
